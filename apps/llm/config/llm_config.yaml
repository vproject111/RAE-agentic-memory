# LLM Orchestrator Configuration - QUANTUM STACK v2.1
default_strategy: single

models:
  - id: local_qwen_optimized
    provider: ollama
    model_name: qwen3.5:9b-optimized
    enabled: true
    roles: [general, industrial, analytics]

  - id: local_qwen
    provider: ollama
    model_name: qwen3.5:9b
    enabled: true
    roles: [general]

  - id: local_phi
    provider: ollama
    model_name: phi3
    enabled: true
    roles: [fast]

  - id: premium_openai
    provider: openai
    model_name: gpt-4o-mini
    enabled: true
    roles: [evaluator, advanced_reasoning]

  - id: openrouter_gemini_flash
    provider: openrouter
    model_name: google/gemini-2.5-flash
    enabled: true
    roles: [general, fast]

  - id: openrouter_qwen_coder
    provider: openrouter
    model_name: qwen/qwen-2.5-coder-32b-instruct
    enabled: true
    roles: [code_generation, analytics]

  - id: openrouter_deepseek_r1
    provider: openrouter
    model_name: deepseek/deepseek-r1
    enabled: true
    roles: [evaluator, advanced_reasoning]

strategies:
  default:
    mode: single
    primary: local_qwen_optimized

  industrial:
    mode: single
    primary: local_qwen_optimized

  council_l2:
    mode: consensus
    models: [local_qwen_optimized, openrouter_gemini_flash, openrouter_qwen_coder]

  council_l3:
    mode: consensus
    models: [openrouter_deepseek_r1, openrouter_qwen_coder]
