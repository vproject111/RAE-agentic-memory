# RAE - Universal Orchestration (Production/Standard)
# Supports 'Core' (default) and 'Full' profiles

services:
  rae-am-api:
    image: rae-api:latest
    pull_policy: build
    build:
      context: .
      args:
        - BASE_IMAGE=python:3.14-slim
        - INSTALL_ML=false
    restart: always
    command: >
      bash -c "alembic upgrade head && uvicorn apps.memory_api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8001:8000"
    environment:
      - RAE_PROFILE=${RAE_PROFILE:-standard}
      - RAE_DB_MODE=${RAE_DB_MODE:-migrate}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - OLLAMA_API_URL=${OLLAMA_API_URL:-http://ollama-dev:11434}
      - RAE_API_KEY=${RAE_API_KEY:-dev-key}
      - ENABLE_API_KEY_AUTH=${ENABLE_API_KEY_AUTH:-false}
      - POSTGRES_USER=${POSTGRES_USER:-rae}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rae_password}
      - POSTGRES_DB=${POSTGRES_DB:-rae}
      - POSTGRES_HOST=${POSTGRES_HOST:-rae-am-postgres}
      - REDIS_URL=${REDIS_URL:-redis://rae-am-redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://rae-am-redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://rae-am-redis:6379/2}
      - QDRANT_HOST=${QDRANT_HOST:-rae-am-qdrant}
    depends_on:
      rae-am-postgres:
        condition: service_healthy
      rae-am-redis:
        condition: service_healthy
      rae-am-qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rae-am-internal

  rae-am-worker:
    image: rae-api:latest
    pull_policy: build
    build:
      context: .
      args:
        - BASE_IMAGE=python:3.14-slim
        - INSTALL_ML=false
    restart: always
    command: celery -A apps.memory_api.celery_app:celery_app worker --loglevel=info
    environment:
      - RAE_PROFILE=${RAE_PROFILE:-standard}
      - RAE_DB_MODE=${RAE_DB_MODE:-migrate}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - OLLAMA_API_URL=${OLLAMA_API_URL:-http://ollama-dev:11434}
      - RAE_API_KEY=${RAE_API_KEY:-dev-key}
      - ENABLE_API_KEY_AUTH=${ENABLE_API_KEY_AUTH:-false}
      - POSTGRES_USER=${POSTGRES_USER:-rae}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rae_password}
      - POSTGRES_DB=${POSTGRES_DB:-rae}
      - POSTGRES_HOST=${POSTGRES_HOST:-rae-am-postgres}
      - REDIS_URL=${REDIS_URL:-redis://rae-am-redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://rae-am-redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://rae-am-redis:6379/2}
      - QDRANT_HOST=${QDRANT_HOST:-rae-am-qdrant}
    depends_on:
      rae-am-postgres:
        condition: service_healthy
      rae-am-redis:
        condition: service_healthy
      rae-am-qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "celery -A apps.memory_api.celery_app:celery_app inspect ping"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    networks:
      - rae-am-internal

  rae-am-beat:
    image: rae-api:latest
    pull_policy: build
    build:
      context: .
      args:
        - BASE_IMAGE=python:3.14-slim
        - INSTALL_ML=false
    restart: always
    command: celery -A apps.memory_api.celery_app:celery_app beat --loglevel=info
    environment:
      - RAE_PROFILE=${RAE_PROFILE:-standard}
      - RAE_DB_MODE=${RAE_DB_MODE:-migrate}
      - REDIS_URL=${REDIS_URL:-redis://rae-am-redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://rae-am-redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://rae-am-redis:6379/2}
    depends_on:
      rae-am-redis:
        condition: service_healthy
    networks:
      - rae-am-internal

  rae-am-reranker:
    pull_policy: build
    build:
      context: ./apps/reranker_service
    restart: always
    ports:
      - "8002:8001"
    environment:
      - MODEL_NAME=cross-encoder/ms-marco-TinyBERT-L-2-v2
    networks:
      - rae-am-internal

  rae-am-postgres:
    image: ankane/pgvector:latest
    # container_name: rae-am-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-rae}
      - POSTGRES_USER=${POSTGRES_USER:-rae}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rae_password}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rae} -d ${POSTGRES_DB:-rae}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rae-am-internal

  rae-am-qdrant:
    image: qdrant/qdrant:latest
    # container_name: rae-am-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - rae-am-internal

  rae-am-redis:
    image: redis:7-alpine
    # container_name: rae-am-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rae-am-internal

networks:
  rae-am-internal:
    name: rae-am-internal
